{% extends 'base.html' %}
{% block content %}
    {% if user.is_authenticated %}
    <h2>Are You Sure you want to Logout? </h2>

    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes</button>
        <a href="{% url 'home' %}" class="btn btn-secondary">Cansle</a>
    </form>
    {% endif %}
{% endblock %}
