{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content%}
<div class='content-section'>
    <form method = "POST">
        {% csrf_token %}
        <fieldset class="form-group">
            <legend class ="border-botton mb-4">Login</legend>
        </fieldset>
        {{ form|crispy }}
        <div class='form-group'>
            <button class='btn btn-primary' type='submit'>Login</button>
        </div>
    </form>
    <div>
        <small>You don't have an account? <a href="{% url 'regester' %}">Sign Up Now</a></small>
    </div>
</div>
{% endblock %}
