{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<form method = "POST" >
    {% csrf_token %}
    <h1 class="mb-4">New Post</h1>
    {{ form|crispy }}
    <div>
        <button type = "submit" class="btn btn-primary">Save Post</button>
        <a href="{% url 'home' %}" class="btn btn-secondary">Cancle</a>
    </div>
</form> 
{% endblock %}
