{% extends "base.html" %}
{% block content %}
<div class="row text-cneter mb-4" >
        <div class="col-md-6 col-lg-4 align-items-center " >
            <h1 class="display-4 mb-4">Nerdy Posts</h1>
        </div>    
    <div>
        <a href="{% url "create" %} " class="btn btn-primary ">Create Post</a>
    </div>
</div>
<div class = "row">
    {% for post in post_list %}
    <div class="col-md-6 mb-4 ">
        <div class="content-section p-3 rounded-2 ">
            <h2>
                <a class="text-dark"href="{% url "details" post.id%}">{{post.title}}</a>
            </h2>
            <p>{{post.content}}</p>
            <div class="d-flex justify-content-between align-items-center">
                <small>{{post.pub_date}}</small>
                <div class='btn-group'>
                    <a href={% url "update" post.id%} class="btn btn-sm btn-outline-secondary">Update</a>
                    <a href={% url "delete" post.id%} class="btn btn-sm btn-outline-danger">Delete</a>
                </div>
            </div>
        </div>
    </div>
    {% empty %} 
    <h1>There are no Posts to View</h1>
    {% endfor %}
</div>
{% endblock %}
